<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AliExpress Overseas Hosting Forum</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Noto Sans',sans-serif;background:#f5f7fa;color:#333}
.hdr{background:linear-gradient(135deg,#ff6a00,#ee0979);color:#fff;padding:16px 20px}
.hdr-in{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:20px}.hdr p{opacity:.9;font-size:13px}
.ls{display:flex;gap:4px;flex-wrap:wrap}
.lb{padding:4px 10px;border:1px solid rgba(255,255,255,.5);background:0 0;color:#fff;border-radius:4px;cursor:pointer;font-size:12px;transition:.2s}
.lb:hover,.lb.on{background:#fff;color:#ff6a00}
.ctn{max-width:1200px;margin:0 auto;padding:20px;display:grid;grid-template-columns:240px 1fr;gap:20px}
@media(max-width:768px){.ctn{grid-template-columns:1fr}}
.sb{background:#fff;border-radius:8px;padding:15px;height:fit-content;position:sticky;top:20px}
.sb h3{font-size:13px;color:#666;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee}
.ci{padding:9px 10px;margin:4px 0;border-radius:6px;cursor:pointer;transition:.2s;font-size:13px}
.ci:hover,.ci.on{background:#fff3e0;color:#ff6a00}
.ci .cn{float:right;background:#eee;padding:1px 7px;border-radius:10px;font-size:11px}
.mn{background:#fff;border-radius:8px;padding:20px}
.st{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.sc{color:#fff;padding:12px;border-radius:8px;text-align:center}
.sc:nth-child(1){background:linear-gradient(135deg,#667eea,#764ba2)}
.sc:nth-child(2){background:linear-gradient(135deg,#f093fb,#f5576c)}
.sc:nth-child(3){background:linear-gradient(135deg,#4facfe,#00f2fe)}
.sc:nth-child(4){background:linear-gradient(135deg,#43e97b,#38f9d7)}
.sc .n{font-size:22px;font-weight:700}.sc .l{font-size:11px;opacity:.9}
.bn{background:linear-gradient(135deg,#ff6a00,#ee0979);color:#fff;border:none;padding:9px 18px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:15px}
.bn:hover{opacity:.9}
.tl{list-style:none}
.ti{padding:14px;border-bottom:1px solid #eee;cursor:pointer;transition:.2s}
.ti:hover{background:#f9f9f9}.ti:last-child{border-bottom:none}
.tt{font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tm{font-size:11px;color:#999;display:flex;gap:12px;flex-wrap:wrap}
.b{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.bp{background:#ff6a00;color:#fff}.bg{background:#4caf50;color:#fff}
.ba{background:#2196f3;color:#fff}.bm{background:#e0e0e0}.bl{background:#f3e5f5;color:#7b1fa2}
.md{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000}
.mc{background:#fff;max-width:600px;margin:40px auto;padding:25px;border-radius:10px;max-height:85vh;overflow-y:auto}
.mc h2{margin-bottom:18px;font-size:18px}
.fg{margin-bottom:14px}.fg label{display:block;margin-bottom:4px;font-weight:500;font-size:13px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.fg textarea{min-height:120px;resize:vertical}
.bt{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.btp{background:#ff6a00;color:#fff}.bts{background:#eee;color:#333;margin-left:8px}
.td{display:none}.td .co{padding:18px 0;line-height:1.7;white-space:pre-wrap}
.rp{padding:14px;margin:8px 0;background:#f9f9f9;border-radius:8px}
.rp.ad{border-left:3px solid #2196f3;background:#f0f7ff}
.rh{display:flex;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.rc{white-space:pre-wrap;line-height:1.6}
.rf{margin-top:18px}
.em{text-align:center;padding:40px 20px;color:#999}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
<div><h1 id="hT"></h1><p id="hS"></p></div>
<div class="ls">
<button class="lb" onclick="setL('zh')">中文</button>
<button class="lb" onclick="setL('en')">EN</button>
<button class="lb" onclick="setL('es')">ES</button>
<button class="lb" onclick="setL('fr')">FR</button>
<button class="lb" onclick="setL('de')">DE</button>
<button class="lb" onclick="setL('pl')">PL</button>
</div>
</div></div>
<div class="ctn">
<div class="sb"><h3 id="sC"></h3>
<div class="ci on" data-c="0"><span data-k="catAll"></span><span class="cn" id="x0">0</span></div>
<div class="ci" data-c="1"><span data-k="catAnnounce"></span><span class="cn" id="x1">0</span></div>
<div class="ci" data-c="2"><span data-k="catOnboard"></span><span class="cn" id="x2">0</span></div>
<div class="ci" data-c="3"><span data-k="catPricing"></span><span class="cn" id="x3">0</span></div>
<div class="ci" data-c="4"><span data-k="catLogistics"></span><span class="cn" id="x4">0</span></div>
<div class="ci" data-c="5"><span data-k="catDisputes"></span><span class="cn" id="x5">0</span></div>
<div class="ci" data-c="6"><span data-k="catTech"></span><span class="cn" id="x6">0</span></div>
<div class="ci" data-c="7"><span data-k="catCommunity"></span><span class="cn" id="x7">0</span></div>
<div class="ci" data-c="8"><span data-k="catRecruit"></span><span class="cn" id="x8">0</span></div>
</div>
<div class="mn">
<div class="st">
<div class="sc"><div class="n" id="aT">0</div><div class="l" data-k="statTopics"></div></div>
<div class="sc"><div class="n" id="aR">0</div><div class="l" data-k="statReplies"></div></div>
<div class="sc"><div class="n" id="aV">0</div><div class="l" data-k="statViews"></div></div>
<div class="sc"><div class="n" id="aM">0</div><div class="l" data-k="statMerchants"></div></div>
</div>
<div style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;align-items:center">
<button class="bn" onclick="showM()" data-k="newTopic" style="margin-bottom:0"></button>
<input id="searchInput" placeholder="搜索帖子..." style="flex:1;min-width:200px;padding:9px;border:1px solid #ddd;border-radius:6px;font-size:13px" oninput="doSearch()">
</div>
<ul class="tl" id="tL"></ul>
<div class="td" id="tD">
<button class="bt bts" onclick="back()" data-k="backList" style="margin-bottom:15px"></button>
<h2 id="dTi"></h2><div class="tm" id="dMe"></div><div class="co" id="dCo"></div>
<div id="rLi"></div>
<div class="rf"><h3 data-k="replyTitle"></h3>
<div class="fg"><input id="rAu" style="width:200px;display:inline-block"></div>
<div class="fg"><textarea id="rCo" style="min-height:100px"></textarea></div>
<button class="bt btp" onclick="doR()" data-k="submitReply"></button>
</div></div>
</div></div>
<div class="md" id="mN"><div class="mc">
<h2 data-k="modalTitle"></h2>
<div class="fg"><label data-k="labelCategory"></label><select id="mCa">
<option value="2" data-k="catOnboard"></option><option value="3" data-k="catPricing"></option>
<option value="4" data-k="catLogistics"></option><option value="5" data-k="catDisputes"></option>
<option value="6" data-k="catTech"></option><option value="7" data-k="catCommunity"></option>
<option value="8" data-k="catRecruit"></option></select></div>
<div class="fg"><label data-k="labelTitle"></label><input id="mTi"></div>
<div class="fg"><label data-k="labelAuthor"></label><input id="mAu"></div>
<div class="fg"><label data-k="labelLang"></label><select id="mLa">
<option value="zh">中文</option><option value="en">English</option><option value="es">Español</option>
<option value="fr">Français</option><option value="de">Deutsch</option><option value="pl">Polski</option></select></div>
<div class="fg"><label data-k="labelContent"></label><textarea id="mCo"></textarea></div>
<button class="bt btp" onclick="doP()" data-k="publishBtn"></button>
<button class="bt bts" onclick="hideM()" data-k="cancelBtn"></button>
</div></div>
<script src="i18n.js?v=4"></script>
<script src="app.js?v=4"></script>
</body>
</html>
